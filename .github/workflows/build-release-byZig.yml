name: Community Build and Release by Zig

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag in FileUni-Community (for example: v1.2.3)"
        required: true
        default: "0.0.1-alpha4.1"
      workspace_ref:
        description: "Source ref in fileuni/FileUni-WorkSpace (tag/branch/sha). Empty = release_tag"
        required: false
        default: ""
      build_mode:
        description: "Build mode override (full/medium/lite/minimal). Empty = vars.BUILD_MODE then minimal"
        required: false
        default: "minimal"
      prerelease:
        description: "Mark this GitHub release as pre-release"
        type: boolean
        required: false
        default: true
      trigger_source:
        description: "Who triggered this release"
        required: false
        default: "manual"

permissions:
  contents: write

concurrency:
  group: fileuni-community-release-zig-${{ inputs.release_tag || github.run_id }}
  cancel-in-progress: false

env:
  WORKSPACE_REPO: fileuni/FileUni-WorkSpace
  OUTPUT_DIR: /tmp/FileUniRelease
  DEFAULT_WORKSPACE_REF: main
  CARGO_TOOLS_ROOT: /home/runner/.cargo-tools

jobs:
  resolve-meta:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      resolved_ref: ${{ steps.meta.outputs.resolved_ref }}
      resolved_mode: ${{ steps.meta.outputs.resolved_mode }}
      resolved_prerelease: ${{ steps.meta.outputs.resolved_prerelease }}
      trigger_source: ${{ steps.meta.outputs.trigger_source }}
    steps:
      - name: Checkout private workspace source (bootstrap)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ vars.WORKSPACE_DEFAULT_REF || env.DEFAULT_WORKSPACE_REF }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Resolve release metadata and source ref via Zig script
        id: meta
        env:
          FILEUNI_WORKSPACE_PAT: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          zig build run -- ci:resolve-community-build \
            --release-tag "${{ inputs.release_tag }}" \
            --workspace-ref "${{ inputs.workspace_ref }}" \
            --build-mode "${{ inputs.build_mode }}" \
            --prerelease "${{ inputs.prerelease }}" \
            --trigger-source "${{ inputs.trigger_source }}" \
            --workspace-repo "${WORKSPACE_REPO}" \
            --workspace-token-env "FILEUNI_WORKSPACE_PAT" \
            --fallback-ref "${{ vars.WORKSPACE_DEFAULT_REF }}" \
            --default-fallback-ref "${DEFAULT_WORKSPACE_REF}"

  build-linux:
    needs: resolve-meta
    runs-on: ubuntu-latest
    env:
      FILEUNI_TARGET_EXCLUDE_GLOB: "*-apple-darwin"
    steps:
      - name: Checkout resolved workspace source ref
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cache cargo installed tools
        uses: actions/cache@v4
        with:
          path: /home/runner/.cargo-tools
          key: ${{ runner.os }}-cargo-tools-v2-tauri2_10
          restore-keys: |
            ${{ runner.os }}-cargo-tools-v2-
            ${{ runner.os }}-cargo-tools-

      - name: Cache cargo-binstall metadata
        uses: actions/cache@v4
        with:
          path: ~/.cache/cargo-binstall
          key: ${{ runner.os }}-cargo-binstall-v1
          restore-keys: |
            ${{ runner.os }}-cargo-binstall-

      - name: Add cargo tools to PATH
        shell: bash
        run: |
          set -euo pipefail
          echo "${CARGO_TOOLS_ROOT}/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry and git index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: workspace/target
          key: ${{ runner.os }}-cargo-target-linux-${{ needs.resolve-meta.outputs.resolved_mode }}-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-linux-${{ needs.resolve-meta.outputs.resolved_mode }}-
            ${{ runner.os }}-cargo-target-linux-
            ${{ runner.os }}-cargo-target-

      - name: Cache Bun package downloads
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('workspace/**/bun.lock', 'workspace/**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Prepare build dependencies and cross tools via Zig script
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          zig build run -- ci:prepare-tools \
            --cargo-tools-root "${CARGO_TOOLS_ROOT}" \
            --tauri-version "~2.10"

      - name: Build release artifacts (Linux host)
        shell: bash
        working-directory: workspace/script-zig
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          build_log="$(mktemp)"
          assert_log="$(mktemp)"
          trap 'rm -f "$build_log" "$assert_log"' EXIT

          annotate_errors() {
            awk '
              {
                print
                clean=$0
                gsub(/\x1B\[[0-9;]*[[:alpha:]]/, "", clean)
                if (clean ~ /\[ERROR\]|build-all failures|target failed|command failed \(|Package .* failed|failed for|error:|fatal error:/) {
                  print "::error::" clean
                }
              }
            '
          }

          collect_failure_digest() {
            awk '
              {
                clean=$0
                gsub(/\x1B\[[0-9;]*[[:alpha:]]/, "", clean)
                if (clean ~ /\[ERROR\]|fatal error:|error: could not compile|unsupported target|failed to find tool|unable to find dynamic system library|russh requires enabling either ring or aws-lc-rs|command failed \(|Package .* failed/) {
                  if (!(clean in seen)) {
                    seen[clean] = 1
                    print clean
                    count++
                    if (count >= 120) {
                      exit
                    }
                  }
                }
              }
            ' "$@"
          }

          set +e
          zig build run -- release:build-all "${{ needs.resolve-meta.outputs.resolved_mode }}" --output-dir "$OUTPUT_DIR" 2>&1 | tee "$build_log" | annotate_errors
          build_exit=${PIPESTATUS[0]}
          if [ "$build_exit" -eq 0 ]; then
            zig build run -- ci:assert-artifacts --output-dir "$OUTPUT_DIR" 2>&1 | tee "$assert_log" | annotate_errors
            assert_exit=${PIPESTATUS[0]}
          else
            echo "skip ci:assert-artifacts because build failed"
            assert_exit=1
          fi
          set -e

          if [ "$build_exit" -ne 0 ] || [ "$assert_exit" -ne 0 ]; then
            failure_digest="$(collect_failure_digest "$build_log" "$assert_log" | sed '/^[[:space:]]*$/d' || true)"
            if [ -z "${failure_digest:-}" ]; then
              failure_digest="No digest lines matched. Check full logs in this step."
            fi
            echo "::group::Failure digest"
            printf '%s\n' "$failure_digest"
            echo "::endgroup::"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              echo "::error::$line"
            done <<< "$failure_digest"
            exit 1
          fi

      - name: Upload Linux workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux-${{ needs.resolve-meta.outputs.release_tag }}
          path: |
            /tmp/FileUniRelease/*

  build-macos:
    needs: [resolve-meta, build-linux]
    runs-on: macos-14
    env:
      FILEUNI_TARGET_INCLUDE_GLOB: "*-apple-darwin"
      FILEUNI_ENABLE_DARWIN_CROSS: "1"
    steps:
      - name: Checkout resolved workspace source ref
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Cache cargo installed tools
        uses: actions/cache@v4
        with:
          path: /Users/runner/.cargo-tools
          key: ${{ runner.os }}-cargo-tools-v2-tauri2_10
          restore-keys: |
            ${{ runner.os }}-cargo-tools-v2-
            ${{ runner.os }}-cargo-tools-

      - name: Add cargo tools to PATH
        shell: bash
        run: |
          set -euo pipefail
          echo "/Users/runner/.cargo-tools/bin" >> "$GITHUB_PATH"

      - name: Cache Cargo registry and git index
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache Rust target directory
        uses: actions/cache@v4
        with:
          path: workspace/target
          key: ${{ runner.os }}-cargo-target-macos-${{ needs.resolve-meta.outputs.resolved_mode }}-${{ hashFiles('workspace/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-macos-${{ needs.resolve-meta.outputs.resolved_mode }}-
            ${{ runner.os }}-cargo-target-macos-
            ${{ runner.os }}-cargo-target-

      - name: Cache Bun package downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Bun
          key: ${{ runner.os }}-bun-cache-${{ hashFiles('workspace/**/bun.lock', 'workspace/**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-cache-

      - name: Prepare build dependencies and cross tools via Zig script
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          zig build run -- ci:prepare-tools \
            --cargo-tools-root "/Users/runner/.cargo-tools" \
            --tauri-version "~2.10" \
            --skip-system-deps=true \
            --skip-fpm=true

      - name: Build release artifacts (macOS host, Darwin targets only)
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          build_log="$(mktemp)"
          assert_log="$(mktemp)"
          trap 'rm -f "$build_log" "$assert_log"' EXIT

          annotate_errors() {
            awk '
              {
                print
                clean=$0
                gsub(/\x1B\[[0-9;]*[[:alpha:]]/, "", clean)
                if (clean ~ /\[ERROR\]|build-all failures|target failed|command failed \(|Package .* failed|failed for|error:|fatal error:/) {
                  print "::error::" clean
                }
              }
            '
          }

          collect_failure_digest() {
            awk '
              {
                clean=$0
                gsub(/\x1B\[[0-9;]*[[:alpha:]]/, "", clean)
                if (clean ~ /\[ERROR\]|fatal error:|error: could not compile|unsupported target|failed to find tool|unable to find dynamic system library|russh requires enabling either ring or aws-lc-rs|command failed \(|Package .* failed/) {
                  if (!(clean in seen)) {
                    seen[clean] = 1
                    print clean
                    count++
                    if (count >= 120) {
                      exit
                    }
                  }
                }
              }
            ' "$@"
          }

          set +e
          zig build run -- release:build-all "${{ needs.resolve-meta.outputs.resolved_mode }}" --output-dir "$OUTPUT_DIR" 2>&1 | tee "$build_log" | annotate_errors
          build_exit=${PIPESTATUS[0]}
          if [ "$build_exit" -eq 0 ]; then
            zig build run -- ci:assert-artifacts --output-dir "$OUTPUT_DIR" 2>&1 | tee "$assert_log" | annotate_errors
            assert_exit=${PIPESTATUS[0]}
          else
            echo "skip ci:assert-artifacts because build failed"
            assert_exit=1
          fi
          set -e

          if [ "$build_exit" -ne 0 ] || [ "$assert_exit" -ne 0 ]; then
            failure_digest="$(collect_failure_digest "$build_log" "$assert_log" | sed '/^[[:space:]]*$/d' || true)"
            if [ -z "${failure_digest:-}" ]; then
              failure_digest="No digest lines matched. Check full logs in this step."
            fi
            echo "::group::Failure digest"
            printf '%s\n' "$failure_digest"
            echo "::endgroup::"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              echo "::error::$line"
            done <<< "$failure_digest"
            exit 1
          fi

      - name: Upload macOS workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ needs.resolve-meta.outputs.release_tag }}
          path: |
            /tmp/FileUniRelease/*

  publish:
    needs: [resolve-meta, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout resolved workspace source ref
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WORKSPACE_REPO }}
          ref: ${{ needs.resolve-meta.outputs.resolved_ref }}
          token: ${{ secrets.FILEUNI_WORKSPACE_PAT }}
          path: workspace
          fetch-depth: 0
          submodules: false

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.15.2"

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*-${{ needs.resolve-meta.outputs.release_tag }}
          path: /tmp/FileUniRelease
          merge-multiple: true

      - name: List merged artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -lah /tmp/FileUniRelease || true

      - name: Publish GitHub Release in community repo via Zig script
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          zig build run -- ci:publish-community-release \
            --repo "${GITHUB_REPOSITORY}" \
            --release-tag "${{ needs.resolve-meta.outputs.release_tag }}" \
            --workspace-ref "${{ needs.resolve-meta.outputs.resolved_ref }}" \
            --build-mode "${{ needs.resolve-meta.outputs.resolved_mode }}" \
            --trigger-source "${{ needs.resolve-meta.outputs.trigger_source }}" \
            --prerelease "${{ needs.resolve-meta.outputs.resolved_prerelease }}" \
            --output-dir "${OUTPUT_DIR}" \
            --token-env "GITHUB_TOKEN"

      - name: Add workflow summary via Zig script
        if: always()
        shell: bash
        working-directory: workspace/script-zig
        run: |
          set -euo pipefail
          zig build run -- ci:write-release-summary \
            --release-tag "${{ needs.resolve-meta.outputs.release_tag }}" \
            --workspace-ref "${{ needs.resolve-meta.outputs.resolved_ref }}" \
            --build-mode "${{ needs.resolve-meta.outputs.resolved_mode }}" \
            --prerelease "${{ needs.resolve-meta.outputs.resolved_prerelease }}" \
            --trigger-source "${{ needs.resolve-meta.outputs.trigger_source }}"
